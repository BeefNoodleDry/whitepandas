<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Style 4 — Soft & Friendly</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: linear-gradient(135deg, #fdf4ff, #eff6ff); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .card { background: white; border-radius: 28px; padding: 52px; max-width: 560px; width: 90%; box-shadow: 0 4px 32px rgba(0,0,0,0.06); }
  .label { font-size: 11px; font-weight: 600; letter-spacing: 0.18em; text-transform: uppercase; color: #a78bfa; margin-bottom: 12px; }
  h1 { font-size: 30px; font-weight: 700; color: #1f2937; margin-bottom: 8px; }
  .sub { color: #9ca3af; font-size: 15px; margin-bottom: 40px; }
  .question-box { background: #faf5ff; border: 1.5px solid #e9d5ff; border-radius: 20px; padding: 32px; margin-bottom: 32px; }
  .question-box p { font-size: 19px; font-weight: 500; color: #374151; line-height: 1.6; }
  .btn { background: #8b5cf6; color: white; font-size: 15px; font-weight: 600; padding: 15px 38px; border-radius: 100px; border: none; cursor: pointer; }
  .hint { margin-top: 16px; font-size: 13px; color: #d1d5db; }
</style>
</head>
<body>
<div class="card">
  <p class="label">WhitePandas</p>
  <h1>Standup Icebreaker 🐼</h1>
  <p class="sub">A fresh question for your team, every week.</p>
  <div class="question-box">
    <p>If you had to eat only one dish for the rest of your life, what would it be?</p>
  </div>
  <button class="btn">Generate another →</button>
  <p class="hint">Don't love it? Keep generating.</p>
</div>
</body>
</html>
