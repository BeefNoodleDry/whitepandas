<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Style 2 — Clean & Minimal</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #ffffff; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .card { max-width: 540px; width: 90%; }
  .label { font-size: 11px; font-weight: 600; letter-spacing: 0.18em; text-transform: uppercase; color: #9ca3af; margin-bottom: 8px; }
  h1 { font-size: 32px; font-weight: 700; color: #111827; margin-bottom: 6px; }
  .sub { color: #6b7280; font-size: 15px; margin-bottom: 48px; }
  .question-box { background: #f9fafb; border: 1px solid #e5e7eb; border-radius: 16px; padding: 32px; margin-bottom: 32px; }
  .question-box p { font-size: 20px; font-weight: 500; color: #111827; line-height: 1.55; }
  .btn { background: #111827; color: white; font-size: 15px; font-weight: 600; padding: 14px 36px; border-radius: 100px; border: none; cursor: pointer; }
  .hint { margin-top: 16px; font-size: 13px; color: #d1d5db; }
</style>
</head>
<body>
<div class="card">
  <p class="label">WhitePandas</p>
  <h1>Standup Icebreaker</h1>
  <p class="sub">A fresh question for your team every week.</p>
  <div class="question-box">
    <p>If you had to eat only one dish for the rest of your life, what would it be?</p>
  </div>
  <button class="btn">Generate another</button>
  <p class="hint">Don't love it? Just generate another.</p>
</div>
</body>
</html>
