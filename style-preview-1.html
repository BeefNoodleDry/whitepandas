<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Style 1 — Playful & Colourful</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', sans-serif; background: #f0f4ff; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .card { background: white; border-radius: 24px; padding: 48px; max-width: 560px; width: 90%; box-shadow: 0 8px 40px rgba(99,102,241,0.15); }
  .badge { display: inline-block; background: #ede9fe; color: #7c3aed; font-size: 11px; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; padding: 6px 14px; border-radius: 100px; margin-bottom: 20px; }
  h1 { font-size: 28px; font-weight: 800; color: #1e1b4b; margin-bottom: 12px; line-height: 1.3; }
  .sub { color: #6b7280; font-size: 15px; margin-bottom: 36px; }
  .question-box { background: linear-gradient(135deg, #ede9fe, #dbeafe); border-radius: 16px; padding: 28px; margin-bottom: 28px; }
  .question-box p { font-size: 19px; font-weight: 600; color: #312e81; line-height: 1.5; }
  .btn { display: inline-block; background: linear-gradient(135deg, #7c3aed, #4f46e5); color: white; font-size: 16px; font-weight: 700; padding: 16px 40px; border-radius: 100px; border: none; cursor: pointer; }
  .hint { margin-top: 16px; font-size: 13px; color: #9ca3af; }
</style>
</head>
<body>
<div class="card">
  <div class="badge">WhitePandas ✦ Weekly Standup</div>
  <h1>This week's icebreaker</h1>
  <p class="sub">One question to kick off your standup.</p>
  <div class="question-box">
    <p>If you had to eat only one dish for the rest of your life, what would it be?</p>
  </div>
  <button class="btn">Generate another ✦</button>
  <p class="hint">Don't love it? Keep generating.</p>
</div>
</body>
</html>
